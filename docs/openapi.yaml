openapi: 3.0.3
info:
  title: Configuration Service API
  version: 1.0.0
paths:
  /api/configurations:
    post:
      summary: Set configurations
      operationId: SetConfigurations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetConfigurationsRequest'
            example:
              entries:
                - key: "FeatureX.Enabled"
                  value: "true"
                - key: "MaxItems"
                  value: "1000"
      responses:
        '200':
          description: OK
        '400':
          description: Validation error
    get:
      summary: Get configurations
      operationId: GetConfigurations
      parameters:
        - name: pageToken
          in: query
          required: false
          schema:
            type: string
            nullable: true
          description: Paging token (opaque string, may be JSON-serialized internally)
          example: null
        - name: pageSize
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 1000
          example: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetConfigurationsResponse'
              example:
                entries:
                  - key: "FeatureX.Enabled"
                    value: "true"
                  - key: "MaxItems"
                    value: "1000"
                pageToken: "{\"lastKey\":\"MaxItems\"}"
        '400':
          description: Validation error

components:
  schemas:
    SetConfigurationsRequest:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SetConfigurationEntry'
    SetConfigurationEntry:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
          example: FeatureX.Enabled
        value:
          type: string
          example: "true"

    GetConfigurationsResponse:
      type: object
      required: [entries, pageToken]
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/GetConfigurationEntry'
        pageToken:
          type: string
          nullable: true
    GetConfigurationEntry:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
        value:
          type: string